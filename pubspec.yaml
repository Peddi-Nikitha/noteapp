name: dezz_note
description: "A simple Notes application with Firebase authentication and CRUD operations."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.2
  
  # State Management
  provider: ^6.1.2
  
  # UI
  google_fonts: ^6.2.1
  intl: ^0.20.2
  flutter_svg: ^2.0.10+1
  
  # Animations
  flutter_staggered_animations: ^1.1.1
  animate_do: ^3.3.4
  
  # Rich Text Editor
  flutter_quill: ^11.0.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
